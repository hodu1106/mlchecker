<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>제보 등록</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f6f7fb;
    }
    .box {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
    }
    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input[type=text],
    input[type=number],
    input[type=file],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      box-sizing: border-box;
      border: 1px solid #d7dce5;
      border-radius: 10px;
      background: #fff;
    }
    textarea {
      resize: vertical;
    }
    button {
      margin-top: 20px;
      padding: 13px 18px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #1f6feb;
      color: white;
      font-weight: bold;
    }
    .muted {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
    .bottom-link {
      margin-top: 18px;
    }
    a {
      text-decoration: none;
      color: #1f6feb;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>제보 등록</h2>
    <p class="muted">
      메랜체커는 메이플랜드 캐릭터 기록 조회 서비스입니다.<br>
      제보 내용은 중립적인 표현으로 작성해 주세요.
    </p>

    <form method="post" enctype="multipart/form-data">
      <label for="character_name">캐릭터명</label>
      <input type="text" id="character_name" name="character_name" required>

      <label for="unique_code">고유코드 (#XXXX)</label>
      <input type="text" id="unique_code" name="unique_code" required>

      <label for="job">직업 (선택)</label>
      <input type="text" id="job" name="job" placeholder="예: 위자드(불,독)">

      <label for="level">최근 확인 레벨 (선택)</label>
      <input type="number" id="level" name="level" min="1" placeholder="예: 64">

      <label for="category">카테고리</label>
      <select id="category" name="category" required>
        <option value="사냥터 이용 관련 제보">사냥터 이용 관련 제보</option>
        <option value="파티 진행 중 충돌 제보">파티 진행 중 충돌 제보</option>
        <option value="거래 관련 분쟁 제보">거래 관련 분쟁 제보</option>
        <option value="커뮤니케이션 관련 제보">커뮤니케이션 관련 제보</option>
        <option value="기타 이용자 간 분쟁">기타 이용자 간 분쟁</option>
      </select>

      <label for="summary">내용 요약</label>
      <textarea id="summary" name="summary" rows="5" required placeholder="중립적인 표현으로 상황을 요약해 주세요."></textarea>

      <label for="image">증거 이미지 (선택)</label>
      <input type="file" id="image" name="image" accept="image/*">

      <label>
        <input type="checkbox" name="evidence">
        증거 있음
      </label>

      <button type="submit">제보하기</button>
    </form>

    <div class="bottom-link">
      <a href="/">← 메인으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
